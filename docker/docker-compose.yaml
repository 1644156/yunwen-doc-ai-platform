# RAG_Project 依赖服务
# 使用方式: cd docker && docker compose up -d
# 前置条件: 已安装 Docker Desktop

services:

  # ======================== Milvus 依赖 ========================

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd -advertise-client-urls=http://etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================== 对象存储 ========================

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"   # API 端口（项目连接此端口）
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================== 向量数据库 ========================

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.14
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    ports:
      - "19530:19530"   # Milvus API（项目连接此端口）
      - "9091:9091"     # Milvus Metrics
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================== 文档数据库 ========================

  mongodb:
    container_name: mongodb
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"   # MongoDB API（项目连接此端口）
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ======================== 图数据库（可选） ========================
  # Neo4j 知识图谱功能尚未在代码中实现，按需启用
  # 取消注释下方内容即可启动

  # neo4j:
  #   container_name: neo4j
  #   image: neo4j:5-community
  #   restart: unless-stopped
  #   environment:
  #     NEO4J_AUTH: neo4j/123123123
  #     NEO4J_PLUGINS: '["apoc"]'
  #   ports:
  #     - "7474:7474"   # Web 控制台
  #     - "7687:7687"   # Bolt 协议
  #   volumes:
  #     - neo4j_data:/data

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  mongo_data:
  # neo4j_data:
